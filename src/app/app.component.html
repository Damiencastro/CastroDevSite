<!-- Application Shell: Header, Main Content, Footer -->

<!-- Header / Navigation -->
<header class="bg-gray-800 text-white shadow-md">
  <nav class="container mx-auto flex justify-between items-center p-4">
    <!-- Logo / Brand -->
    <a routerLink="/home" class="text-xl font-bold hover:text-gray-300 transition duration-300">
      Damien Castro | Developer
    </a>

    <!-- Navigation Links -->
    <div class="hidden md:flex space-x-1">
      <a 
        routerLink="/home" 
        routerLinkActive="bg-gray-700" 
        class="px-3 py-2 rounded hover:bg-gray-700 transition duration-300"
      >
        Home
      </a>
      <a 
        routerLink="/about" 
        routerLinkActive="bg-gray-700"
        class="px-3 py-2 rounded hover:bg-gray-700 transition duration-300"
      >
        About
      </a>
      <a 
        routerLink="/portfolio" 
        routerLinkActive="bg-gray-700"
        class="px-3 py-2 rounded hover:bg-gray-700 transition duration-300"
      >
        Portfolio
      </a>
      <a 
        routerLink="/blog" 
        routerLinkActive="bg-gray-700"
        class="px-3 py-2 rounded hover:bg-gray-700 transition duration-300"
      >
        Blog
      </a>
      <a 
        routerLink="/resume" 
        routerLinkActive="bg-gray-700"
        class="px-3 py-2 rounded hover:bg-gray-700 transition duration-300"
      >
        Resume
      </a>
      <a 
        routerLink="/contact" 
        routerLinkActive="bg-gray-700"
        class="px-3 py-2 rounded hover:bg-gray-700 transition duration-300"
      >
        Contact
      </a>
    </div>

    <!-- Mobile Menu Button (placeholder - implement hamburger menu later) -->
    <div class="md:hidden">
      <button class="px-3 py-2 rounded hover:bg-gray-700">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
  </nav>
</header>

<!-- Main Content Area -->
<main class="flex-grow min-h-screen bg-gray-100">
  <router-outlet></router-outlet>
</main>

<!-- Footer -->
<footer class="bg-gray-800 text-white">
  <div class="container mx-auto px-4 py-8">
    <div class="flex flex-col md:flex-row justify-between items-center">
      <!-- Copyright -->
      <p class="text-gray-400 text-sm">
        &copy; {{ currentYear }} Damien Castro. All Rights Reserved.
      </p>

      <!-- Social Links -->
      <div class="flex space-x-4 mt-4 md:mt-0">
        <!-- GitHub -->
        <a 
          href="https://github.com/Damiencastro" 
          target="_blank" 
          rel="noopener noreferrer"
          class="text-gray-400 hover:text-white transition duration-300"
          aria-label="GitHub Profile"
        >
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">

        <!-- LinkedIn -->
        <a 
          href="https://www.linkedin.com/in/damien-castro-dev" 
          target="_blank" 
          rel="noopener noreferrer"
          class="text-gray-400 hover:text-white transition duration-300"
          aria-label="LinkedIn Profile"
        >
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>

        </a>

        <!-- Email -->
        <a 
          href="mailto:email@damiencastro.dev"
          class="text-gray-400 hover:text-white transition duration-300"
          aria-label="Send Email"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>

      </div>
    </div>
  </div>
</footer>
